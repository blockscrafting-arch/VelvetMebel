<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velvet Mebel — админка</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
  <div id="app" class="max-w-[1600px] mx-auto h-screen flex flex-col md:flex-row">
    <aside class="w-full md:w-80 bg-white border-b md:border-b-0 md:border-r flex flex-col md:h-screen shrink-0">
      <div class="p-3 border-b space-y-2">
        <input
          v-model="search"
          @input="onSearchInput"
          type="search"
          placeholder="Поиск: имя, телефон, ID…"
          class="w-full border rounded-lg px-3 py-2 text-sm"
        />
        <div class="flex flex-wrap gap-1 text-xs">
          <button
            v-for="t in tabDefs"
            :key="t.key"
            type="button"
            @click="setTab(t.key)"
            :class="tab === t.key ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-700'"
            class="px-2 py-1 rounded"
          >{{ t.label }}</button>
        </div>
      </div>
      <div class="overflow-y-auto flex-1 min-h-[200px]">
        <div
          v-for="d in dialogs"
          :key="d.user_id"
          @click="selectDialog(d)"
          :class="[
            'px-3 py-2 border-b cursor-pointer hover:bg-slate-50',
            selected && selected.user_id === d.user_id ? 'bg-blue-50' : '',
            d.last_feedback_status === 'problem' ? 'border-l-4 border-l-red-500' : ''
          ]"
        >
          <div class="font-medium text-sm">{{ displayName(d) }}</div>
          <div class="text-xs text-slate-500 truncate">
            {{ d.last_model || '—' }} · {{ statusRu(d.last_feedback_status) }}
          </div>
        </div>
        <p v-if="!dialogs.length" class="p-4 text-sm text-slate-400">Нет диалогов</p>
      </div>
    </aside>

    <main class="flex-1 flex flex-col min-h-0 bg-slate-50">
      <template v-if="selected">
        <header class="bg-white border-b p-4 space-y-3 shrink-0">
          <div class="flex flex-wrap gap-4 items-start justify-between">
            <div>
              <h1 class="text-lg font-semibold">{{ displayName(selected) }}</h1>
              <p class="text-sm text-slate-600">
                ID: {{ selected.user_id }}
                <span v-if="selected.username"> · @{{ selected.username }}</span>
              </p>
              <p class="text-sm text-slate-600">
                Модель: <strong>{{ selected.last_model || '—' }}</strong>
                · Телефон: <strong>{{ selected.phone || '—' }}</strong>
              </p>
              <p class="text-sm text-slate-600">
                Отзыв: <strong>{{ statusRu(selected.last_feedback_status) }}</strong>
              </p>
            </div>
            <div class="flex flex-col gap-1 text-sm">
              <label class="text-slate-500">Статус диалога</label>
              <select
                v-model="dialogStatus"
                @change="saveDialogStatus"
                class="border rounded px-2 py-1"
              >
                <option value="new">Новый</option>
                <option value="in_progress">В работе</option>
                <option value="resolved">Решён</option>
              </select>
            </div>
          </div>
          <div class="flex gap-2 flex-wrap">
            <button
              type="button"
              @click="showTplModal = true"
              class="px-3 py-1.5 bg-slate-200 rounded text-sm hover:bg-slate-300"
            >Управление шаблонами</button>
          </div>
        </header>

        <div ref="msgBox" class="flex-1 overflow-y-auto p-4 space-y-2 min-h-0">
          <div
            v-for="m in messages"
            :key="m.id"
            :class="[
              'max-w-[85%] rounded-lg px-3 py-2 text-sm whitespace-pre-wrap break-words',
              m.sender_type === 'user' ? 'bg-white border mr-auto' : '',
              m.sender_type === 'bot' ? 'bg-emerald-100 ml-auto' : '',
              m.sender_type === 'admin' ? 'bg-blue-100 ml-auto' : ''
            ]"
          >
            <span class="text-xs opacity-60 block mb-1">
              {{ m.sender_type === 'user' ? 'Клиент' : (m.sender_type === 'bot' ? 'Бот' : 'Менеджер') }}
              · {{ m.created_at }}
            </span>
            {{ m.text }}
          </div>
        </div>

        <footer class="bg-white border-t p-3 shrink-0 space-y-2">
          <div class="flex flex-wrap gap-2 items-center">
            <select v-model="templateId" class="border rounded px-2 py-1 text-sm max-w-xs">
              <option value="">— Быстрый ответ —</option>
              <option v-for="tpl in templates" :key="tpl.id" :value="String(tpl.id)">
                {{ tpl.title }}
              </option>
            </select>
            <button type="button" @click="applyTemplate" class="text-sm text-blue-600 hover:underline">Вставить</button>
          </div>
          <div class="flex gap-2">
            <textarea
              v-model="outText"
              rows="2"
              class="flex-1 border rounded-lg px-3 py-2 text-sm resize-none"
              placeholder="Сообщение клиенту (от имени бота)…"
            ></textarea>
            <button
              type="button"
              @click="sendMessage"
              :disabled="sending"
              class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium disabled:opacity-50"
            >Отправить</button>
          </div>
        </footer>
      </template>
      <div v-else class="flex-1 flex items-center justify-center text-slate-400 p-8">
        Выберите диалог слева
      </div>
    </main>

    <!-- Модальное окно шаблонов -->
    <div
      v-if="showTplModal"
      class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4"
      @click.self="showTplModal = false"
    >
      <div class="bg-white rounded-xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-4 shadow-xl">
        <h2 class="text-lg font-semibold mb-3">Быстрые ответы</h2>
        <ul class="space-y-2 mb-4 max-h-48 overflow-y-auto text-sm">
          <li v-for="tpl in templates" :key="tpl.id" class="flex justify-between gap-2 border-b pb-2">
            <span><strong>{{ tpl.title }}</strong></span>
            <button type="button" class="text-red-600 text-xs" @click="deleteTpl(tpl.id)">Удалить</button>
          </li>
        </ul>
        <div class="space-y-2 border-t pt-3">
          <input v-model="newTplTitle" placeholder="Заголовок" class="w-full border rounded px-2 py-1 text-sm" />
          <textarea v-model="newTplText" placeholder="Текст" rows="3" class="w-full border rounded px-2 py-1 text-sm"></textarea>
          <button type="button" @click="addTpl" class="w-full py-2 bg-blue-600 text-white rounded text-sm">Добавить шаблон</button>
        </div>
        <button type="button" @click="showTplModal = false" class="mt-3 w-full py-2 border rounded text-sm">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          tab: 'all',
          tabDefs: [
            { key: 'all', label: 'Все' },
            { key: 'review_requested', label: 'Отзыв запрошен' },
            { key: 'review_received', label: 'Отзыв получен' },
            { key: 'problems', label: 'Проблемы' },
          ],
          dialogs: [],
          selected: null,
          messages: [],
          templates: [],
          templateId: '',
          outText: '',
          dialogStatus: 'new',
          search: '',
          searchTimer: null,
          sending: false,
        showTplModal: false,
        newTplTitle: '',
        newTplText: '',
        refreshTimer: null,
      };
    },
    mounted() {
      this.loadDialogs();
      this.loadTemplates();
      this.refreshTimer = setInterval(() => {
        this.loadDialogs(true);
        if (this.selected) {
          this.refreshMessages(true);
        }
      }, 5000);
    },
    unmounted() {
      if (this.refreshTimer) clearInterval(this.refreshTimer);
    },
    methods: {
        statusRu(s) {
          const map = {
            pending: 'Ожидание опроса',
            no_response: 'Отзыв запрошен',
            ok: 'Успешно',
            problem: 'Проблема',
            failed_send: 'Ошибка отправки',
          };
          return map[s] || s || '—';
        },
        displayName(d) {
          const n = [d.first_name, d.last_name].filter(Boolean).join(' ').trim();
          return n || ('Пользователь ' + d.user_id);
        },
        async fetchJson(url, opts = {}) {
          const r = await fetch(url, {
            credentials: 'same-origin',
            ...opts,
            headers: {
              'Content-Type': 'application/json',
              ...(opts.headers || {}),
            },
          });
          if (r.status === 401) {
            window.location.reload();
            throw new Error('auth');
          }
          if (!r.ok) {
            const t = await r.text();
            throw new Error(t || r.statusText);
          }
          if (r.status === 204) return null;
          return r.json();
        },
        setTab(key) {
          this.tab = key;
          this.loadDialogs();
        },
        onSearchInput() {
          clearTimeout(this.searchTimer);
          this.searchTimer = setTimeout(() => this.loadDialogs(), 300);
        },
      async loadDialogs(silent = false) {
        try {
          const q = new URLSearchParams({ tab: this.tab, search: this.search || '' });
          const data = await this.fetchJson('/api/dialogs?' + q.toString());
          this.dialogs = data.dialogs || [];
        } catch(e) {
          if (!silent) console.error("loadDialogs error", e);
        }
      },
      async loadTemplates() {
        try {
          const data = await this.fetchJson('/api/templates');
          this.templates = data.templates || [];
        } catch(e) {}
      },
      async refreshMessages(silent = false) {
        if (!this.selected) return;
        try {
          const data = await this.fetchJson('/api/messages/' + this.selected.user_id);
          const newLen = (data.messages || []).length;
          const oldLen = this.messages.length;
          this.messages = data.messages || [];
          if (newLen > oldLen) {
            this.$nextTick(() => this.scrollMessages());
          }
        } catch(e) {
          if (!silent) console.error("refreshMessages error", e);
        }
      },
      async selectDialog(d) {
        this.selected = d;
        this.dialogStatus = d.dialog_status || 'new';
        this.templateId = '';
        await this.refreshMessages();
        this.$nextTick(() => this.scrollMessages());
      },
        scrollMessages() {
          const el = this.$refs.msgBox;
          if (el) el.scrollTop = el.scrollHeight;
        },
        applyTemplate() {
          if (!this.templateId) return;
          const id = Number(this.templateId);
          const t = this.templates.find((x) => x.id === id);
          if (t) this.outText = (this.outText ? this.outText + '\n' : '') + t.text;
        },
        async sendMessage() {
          const t = (this.outText || '').trim();
          if (!t || !this.selected || this.sending) return;
          this.sending = true;
          try {
            await this.fetchJson('/api/send/' + this.selected.user_id, {
              method: 'POST',
              body: JSON.stringify({ text: t }),
            });
            this.outText = '';
            await this.selectDialog(this.selected);
          } catch (e) {
            alert('Ошибка отправки: ' + e.message);
          } finally {
            this.sending = false;
          }
        },
        async saveDialogStatus() {
          if (!this.selected) return;
          try {
            await this.fetchJson('/api/dialogs/' + this.selected.user_id + '/status', {
              method: 'PUT',
              body: JSON.stringify({ status: this.dialogStatus }),
            });
            this.selected.dialog_status = this.dialogStatus;
            await this.loadDialogs();
          } catch (e) {
            alert(e.message);
          }
        },
        async addTpl() {
          const title = (this.newTplTitle || '').trim();
          const text = (this.newTplText || '').trim();
          if (!title || !text) return;
          await this.fetchJson('/api/templates', {
            method: 'POST',
            body: JSON.stringify({ title, text }),
          });
          this.newTplTitle = '';
          this.newTplText = '';
          await this.loadTemplates();
        },
        async deleteTpl(id) {
          if (!confirm('Удалить шаблон?')) return;
          await this.fetchJson('/api/templates/' + id, { method: 'DELETE' });
          await this.loadTemplates();
        },
      },
    }).mount('#app');
  </script>
</body>
</html>
